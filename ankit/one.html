<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Investiture Ceremony Budget</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        margin: 0;
        padding: 30px;
        color: #333;
    }

    .container {
        max-width: 700px;
        margin: auto;
        background: #fff;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    h1 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 20px;
        font-size: 26px;
    }

    .section {
        margin-bottom: 20px;
        padding: 15px;
        border-left: 5px solid #4a90e2;
        background: #f9fbff;
        border-radius: 8px;
    }

    .section h2 {
        margin: 0 0 10px;
        font-size: 18px;
        color: #2c3e50;
    }

    .item {
        display: flex;
        justify-content: space-between;
        margin: 6px 0;
        font-size: 15px;
    }

    .total {
        background: #2c3e50;
        color: #fff;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        font-size: 18px;
        margin-top: 20px;
    }

    .highlight {
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">

    <h1>Investiture Ceremony Budget</h1>

    <div class="section">
        <h2>Participants Overview</h2>
        <div class="item"><span>Total Candidates</span><span class="highlight">17</span></div>
        <div class="item"><span>Badges Required</span><span class="highlight">17</span></div>
        <div class="item"><span>Shashes</span><span class="highlight">17</span></div>
        <!-- <div class="item"><span>DOFE</span><span class="highlight">1</span></div> -->
    </div>

    <div class="section">
        <h2>Cost Breakdown</h2>
        <div class="item"><span>Badges (₹70 × 17)</span><span>₹1,190</span></div>
        <div class="item"><span>Sashes (₹150 × 17) (approx.)</span><span>₹2,250</span></div>
        <div class="item"><span>Backdrop & Stage Setup</span><span>₹3,000</span></div>
        <div class="item"><span>Decoration</span><span>₹1,500</span></div>
    </div>

    <div class="total">
        Total Estimated Amount: ₹7,940 (Approx.)
    </div>

</div>

</body>
</html>
