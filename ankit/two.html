
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flow of Events</title>
<style>
    body {
        font-family: "Segoe UI", sans-serif;
        background: #f4f6f9;
        margin: 0;
        padding: 40px;
        color: #2c3e50;
    }

    .container {
        max-width: 700px;
        margin: auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 14px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h1 {
        text-align: center;
        font-size: 26px;
        margin-bottom: 25px;
        color: #1f3a56;
        letter-spacing: 1px;
    }

    .timeline {
        position: relative;
        margin-left: 20px;
        padding-left: 20px;
        border-left: 3px solid #4a90e2;
    }

    .event {
        margin-bottom: 18px;
        position: relative;
        padding-left: 10px;
    }

    .event::before {
        content: "";
        position: absolute;
        left: -11px;
        top: 5px;
        width: 14px;
        height: 14px;
        background: #4a90e2;
        border-radius: 50%;
        box-shadow: 0 0 0 4px #eaf2ff;
    }

    .event span {
        font-size: 16px;
        line-height: 1.5;
    }

    .number {
        font-weight: bold;
        color: #4a90e2;
        margin-right: 6px;
    }
</style>
</head>

<body>

<div class="container">

    <h1>Flow of Events</h1>

    <div class="timeline">

        <div class="event">
            <span><span class="number">1.</span> Introduction of the Event</span>
        </div>

        <div class="event">
            <span><span class="number">2.</span> Welcome Speech</span>
        </div>

        <div class="event">
            <span><span class="number">3.</span> Lamp Lighting Ceremony</span>
        </div>

        <div class="event">
            <span><span class="number">4.</span> Announcement of Student Council</span>
        </div>

        <div class="event">
            <span><span class="number">5.</span> Distribution Ceremony of Badges and Shashes</span>
        </div>

        <div class="event">
            <span><span class="number">6.</span> Oath Taking Ceremony</span>
        </div>

        <div class="event">
            <span><span class="number">7.</span> Vote of Thanks</span>
        </div>

    </div>

</div>

</body>
</html>
